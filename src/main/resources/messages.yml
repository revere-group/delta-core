broadcasts:
  alert:
    - ""
    - "&4&lALERT &7- &cAttention!"
    - "%message%"
    - ""
  broadcast:
    - ""
    - "&7[&6Broadcast&7] &f%message%"
    - ""

player:
  ping: "&b%player%&f's ping: &b%ping% &fms"
  ping-target: "&b%target%&f's ping: &b%ping% &fms"
  playtime: "&fYour playtime: &b%playtime%&f."
  playtime-target: "&b%target%&f's playtime: &b%playtime%&f."
  healed-by: "&fYou've been &bhealed &fby &b%player%&f!"
  inventory-cleared-by: "&fYour &binventory &fhas been &bcleared &fby &b%player%&f!"
  help-request-sent: "&aYou've requested help: &b%reason%"
  location:
    shared: "&fYou have shared your &blocation &fwith &b%target%&f."
    received: "&b%player% &fhas shared their &blocation &fwith you. &7(&b%x%&7, &b%y%&7, &b%z%&7)"

chat:
  clan-prefix: "&8[%clan%&8]"
  clan-name-small-font: true
  player-name-small-font: true
  rank-prefix-small-font: true
  format: "%rank%%clan%%color%%player%%tag%&f: &f%message%"
  filter:
    enabled: true
    notify-self: "&f[&bChat&f] &fYour message has been filtered. &7(&b%word%&7)"
    notify-staff: "&f[&bChat&f] &b%player% &fhas used a filtered word. &7(&b%word%&7)"
    words:
      - niggers
      - nigger
      - niggas
      - nigga
      - sluts
      - slut

conversation:
  cant-msg-self: "&cYou cannot message yourself!"
  from: "&f(&bFrom %sender%&f) %message%"
  to: "&f(&bTo %receiver%&f) %message%"

more-command:
  given: "&aThere you go."
  already-a-stack: "&cThis is already a stack of 64."
  no-item-held: "&cYou need to be holding an item!"

fly-command:
  player-not-found: "&cPlayer not found."
  message: "&fYour &bflight &fhas been &r%status%&f."
  message-target: "&fYou've &r%status% &b%target%&f's flight."
  changed-by: "&fYour flight has been &b%status% &fby &b%player%&f."

on-join:
  title-sender:
    enabled: true
    main-title: "<#0544AC>&lDELTA"
    sub-title: "&fWelcome to Delta Network, &b%player%&f!"
  messages:
    bars-format: "&8&m-----------------------------------"
    welcome-message:
      enabled: true
      message:
        - " "
        - "%bars%"
        - " "
        - "  &fWelcome to the server, &b%player%&f! &7(&c%health%&4❤&7)"
        - " "
        - "   ● Website: &bhttps://www.revere.dev"
        - "   ● Discord: &bhttps://discord.revere.dev"
        - "   ● Store: &bhttps://store.revere.dev"
        - "   ● Vote: &bhttps://minecraft-mp.com/server-s333120"
        - " "
        - " &fNew to the server? &b[Type /rules]"
        - " "
        - "%bars%"
        - " "
    joined-the-game:
      enabled: true
      message: "&f[%color%+&f] &b%color%%player% &fhas joined."
    first-join:
      enabled: false
      message: "&f[&b+&f] &fWelcome to &b%player%'s &ffirst time on the server!"

on-leave:
  messages:
    left-the-game: "&f[%color%-&f] &c%color%%player% &fhas left."

trolling:
  strike: "&fYou've struck &b%target% &fwith lightning!"
  strike-all:
    message: "&fYou've struck &ball players with lightning!"
    broadcast:
      enabled: true
      message:
        - ""
        - "&f&l[&b&lTrolling&f&l] &fAll players &bhave been struck by lightning!"
        - ""
  hurt: "&fYou've hurt &b%target%&f! &f(&c- %damage%&c❤&f)"
  launch: "&b%target% &fhas been launched into the air!"
  launch-all:
    message: "&fYou've launched &ball &fplayers into the air!"
    broadcast:
      enabled: true
      message: "&f&l[&b&lTrolling&f&l] &fAll players &bhave been launched into the air!"
  capture:
    message: "&fYou've captured &b%target%&f!"

staff:
  ore-notify:
    delay: 10
    enabled: true
    message: "&3[&bS&3] &b%player% &fmined &b%total% &f%ore% ores in the last &b%time% &fseconds."
  logger:
    enabled: true
    commands: ["gamemode", "teleport", "tp", "give", "vanish", "v", "s"]
    message: "&3[&bS&3] &b%player% &fhas executed &b%command%&f."
  vanish:
      toggle: "&fYour &bvanish &fhas been &r%status%&f."
      toggle-target: "&fYou have &b%status% &b%target%'s &fvanish."
      toggled-by: "&b%player% &fhas &b%status% &fyour vanish."
  chat:
    toggled: "&fYour staff chat has been &r%status%&f."
    format: "&3[&bStaff Chat&3] &7(%server%) &b%rank-color%%player%&f: &7%message%"
  teleport:
    teleported: "&3[&bS&3] &fYou've teleported to &b%target-rank-color%%target%&f."
    tp-all: "&fTeleported &ball &fplayers to &b%rank-color%%player%&f."
    tp-pos: "&3[&bS&3] &fTeleported &byou &fto the provided &blocation. (&b%x%x&f, &b%y%y&f, &b%z%z&f)"
    tp-up: "&3[&bS&3] &fTeleported &byou &fto the &btop&f."
    tp-here:
      sender: "&fYou've teleported &3%rank-color%%target% &fto &byourself&f."
      target: "&3%rank-color%%player% &fteleported you to their &blocation&f."
  report: "&3[&bS&3] &b%player% &fhas reported &b%target% &ffor &b%reason%&f."
  help: "&3[&bS&3] &b%player% &fhas requested help from staff. &7(&b%message%&7)"
  sudo: "&3[&bS&3] &fYou've made &b%target% &ftype &b%command%&f in chat!"
  sudo-all: "&3[&bS&3] &fYou've made &beveryone &ftype &b%command%&f in chat!"
  invsee: "&3[&bS&3] &fViewing &b%target%'s &finventory."
  endinvsee: "&3[&bS&3] &fViewing &b%target%'s &fender chest."
  healed: "&3[&bS&3] &fYou've been healed."
  cleared-inventory: "&3[&bS&3] &fYour &binventory &fhas been &bcleared&f."

reload:
  reloading:
    - "&r"
    - "&8&m-----------------------------------------------------"
    - " &7[&cWARNING&7] &fReloading the configuration files..."
    - "&r"
    - " &8[&b%configs%&8]"
    - "&8&m-----------------------------------------------------"
    - "&r"
  finished:
    - "&b➥ &fSuccessfully reloaded the &bconfiguration &ffiles! &f(&b%timetaken% ms&f)"
    - "&r"

instance-command:
  separator-format: "&f, &b"
  lines:
    - " "
    - "&8&m-----------------------------------"
    - " "
    - "&b&lServer Details:"
    - " &fVersion: &b%version%"
    - " &fServer Region: &b%server-region%"
    - " &fServer Name: &b%server-name%"
    - " &fSoftware: &b%spigot%"
    - " &fUptime: &b%uptime%"
    - " &fTPS: &b%tps1% %tps2% %tps3%"
    - " &fPlayers: &b%online-players%&f/&b%max-players%"
    - " "
    - "&b&lMemory Usage:"
    - " &fMax Memory: &b%max-memory%"
    - " &fFree Memory: &b%free-memory%"
    - " &fUsed Memory: &b%used-memory%"
    - " &fAllocated Memory: &b%allocated-memory%"
    - " "
    - "&b&lCPU Usage:"
    - " &fProcessors: &b%cpu-cores%"
    - " &fSystem Load: &b%cpu-load%"
    - " "
    - "&b&lOperators: &f(&b%ops%&f)"
    - " &f- &b%ops-name%"
    - " "
    - "&b&lInstalled Plugins: &f(&b%plugins%&f)"
    - " &f- &b%plugins-name%"
    - " "
    - "&8&m-----------------------------------"

list-command:
  staff-format: "   &f- &f%staff%"
  player-format: "   &f- &f%player%"
  no-staff: "&fThere are no staff members online."
  lines:
    - "&8&m-----------------------------------"
    - "&b&lOnline Staff"
    - "%staffs%"
    - " "
    - "%ranks%"
    - '&7[&f%online%&f/&f%max%&7] %players%'
    - "&8&m-----------------------------------"
