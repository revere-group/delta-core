broadcasts:
  alert:
    - ""
    - "&4&lALERT &8- &cAttention!"
    - " &f%message%"
    - ""
  broadcast:
    - ""
    - "&7[&bBroadcast&7] &f%message%"
    - ""

player:
  ping: "&fYour ping is &b%ping%&f."
  ping-target: "&f%target%'s ping is &b%ping%&f."
  playtime: "&fYour playtime is &b%playtime%&f."
  playtime-target: "&f%target%'s playtime is &b%playtime%&f."
  healed-by: "&fYou've been healed by &b%player%&f!"
  inventory-cleared-by: "&fYour inventory has been cleared by &b%player%&f!"
  help-request-sent: "&aYour help request has been sent to staff. &8(Reason: &7%reason%&8)"
  location:
    shared: "&f[&bLocation&f] &fYou have shared your location with &b%target%&f."
    received: "&f[&bLocation&f] &b%player% &fhas shared their location with you. &7(&b%x%&7, &b%y%&7, &b%z%&7)"

chat:
  format:
    regular: "%clan%%player%&f: &f%message%"
    staff: "%clan%&b%player%&f: &f%message%"

conversation:
  cant-msg-self: "&cYou cannot message yourself!"
  from: "&f(&bFrom %sender%&f) %message%"
  to: "&f(&bTo %receiver%&f) %message%"

more-command:
  given: "&aThere you go."
  already-a-stack: "&cThis is already a stack of 64."
  no-item-held: "&cYou need to be holding an item!"

fly-command:
  player-not-found: "&cPlayer not found."
  message: "&fYou've &b%status% &fflight."
  message-target: "&fYou've &b%status% &fflight for &b%target%&f."
  changed-by: "&fYour flight has been &b%status% &fby &b%player%&f."

on-join:
  title-sender:
    enabled: true
    main-title: "{#0544AC>}&lRevere{#2188EB<}"
    sub-title: "&fWelcome to the SMP, &b%player%&f!"
  messages:
    bars-format: "&8&m-----------------------------------"
    welcome-message:
      enabled: true
      message:
        - " "
        - "%bars%"
        - " "
        - "  &fWelcome to the server, &b%player%&f! &7(&c%health%&4❤&7)"
        - " "
        - "   ● Website: &bhttps://www.revere.dev"
        - "   ● Discord: &bhttps://discord.revere.dev"
        - "   ● Store: &bhttps://store.revere.dev"
        - "   ● Vote: &bhttps://minecraft-mp.com/server-s333120"
        - " "
        - " &fNew to the server? &b[Type /rules]"
        - " "
        - "%bars%"
        - " "
    joined-the-game: "&f[&b+&f] &b%player% &fhas joined."
    first-join: "&f[&b+&f] &fWelcome to &b%player%'s &ffirst time on the server!"

on-leave:
  messages:
    left-the-game: "&f[&c-&f] &c%player% &fhas left."

trolling:
  strike: "&f&l[&b&lTrolling&f&l] &fYou've struck &b%target% &fwith lightning!"
  strike-all:
    message: "&f&l[&b&lTrolling&f&l] &fYou've struck all players with lightning!"
    broadcast:
      enabled: true
      message:
        - ""
        - "&f&l[&b&lTrolling&f&l] &fAll players &bhave been struck by lightning!"
        - ""
  hurt: "&f&l[&b&lTrolling&f&l] &fYou've hurt &b%target%&f! &f(&c- %damage%&c❤&f)"
  launch: "&f&l[&b&lTrolling&f&l] &b%target% &fhas been launched into the air!"
  launch-all:
    message: "&f&l[&b&lTrolling&f&l] &fAll players &bhave &fbeen launched into the air!"
    broadcast:
      enabled: true
      message: "&f&l[&b&lTrolling&f&l] &fAll players &bhave been launched into the air!"
  capture:
    message: "&f&l[&b&lTrolling&f&l] &fYou've captured &b%target%&f!"

staff:
  ore-notify:
    delay: 10
    enabled: true
    message: "&f&l[&b&lStaff&f&l] &b%player% &fmined &b%total% &f%ore% ores in the last &b%time% &fseconds."
  logger:
    enabled: true
    commands: ["gamemode", "teleport", "tp", "give", "vanish", "v"]
    message: "&f&l[&b&lStaff&f&l] &b%player% &fhas executed command: &b%command%&f."
  chat:
    toggled: "&f[&bSC&f] &fYou've &r%status% &fstaff chat."
    format: "&f[&bSC&f] &b%player%&f: &7%message%"
  report:
    format: "&f[&bReport&f] &b%player% &fhas reported &b%target% &ffor &b%reason%&f."
  help:
    format: "&f[&bRequest&f] &b%player% &fhas requested help from staff. &7(&b%message%&7)"
  sudo:
    format: "&f&l[&b&lStaff&f&l] &fYou've made &b%target% &ftype &b%command%&f in chat!"
  invsee:
    format: "&f&l[&b&lStaff&f&l] &fViewing &b%target%'s &finventory."
  endinvsee:
    format: "&f&l[&b&lStaff&f&l] &fViewing &b%target%'s &fender chest."
  healed:
    format: "&f&l[&b&lStaff&f&l] &fYou've been healed."
  cleared-inventory:
    format: "&f&l[&b&lStaff&f&l] &fYou've cleared your inventory."
  vanish:
      toggle: "&f&l[&b&lStaff&f&l] &fYou've &b%status% &fvanished."
      toggle-target: "&f&l[&b&lStaff&f&l] &fYou have &b%status% &b%target%'s &fvanish."
      toggled-by: "&f&l[&b&lStaff&f&l] &b%player% &fhas &b%status% &f your vanish."


reload:
  reloading:
    - "&r"
    - "&8&m-----------------------------------------------------"
    - " &7[&cWARNING&7] &fReloading the configuration files..."
    - "&r"
    - " &8[&bMenus folder, Commands.yml, Database.yml"
    - " &bMessages.yml, Ranks.yml, &bSettings.yml&8]"
    - "&8&m-----------------------------------------------------"
    - "&r"
  finished:
    - "&b➥ &fSuccessfully reloaded the &bconfiguration &ffiles! &f(&b%timetaken% ms&f)"
    - "&r"

instance-command:
  separator-format: "&f, &b"
  lines:
    - " "
    - "&8&m-----------------------------------"
    - " "
    - "&b&lServer Details:"
    - " &fVersion: &b%version%"
    - " &fServer Region: &b%server-region%"
    - " &fServer Name: &b%server-name%"
    - " &fSoftware: &b%spigot%"
    - " &fUptime: &b%uptime%"
    - " &fTPS: &b%tps1% %tps2% %tps3%"
    - " &fPlayers: &b%online-players%&f/&b%max-players%"
    - " "
    - "&b&lMemory Usage:"
    - " &fMax Memory: &b%max-memory%"
    - " &fFree Memory: &b%free-memory%"
    - " &fUsed Memory: &b%used-memory%"
    - " &fAllocated Memory: &b%allocated-memory%"
    - " "
    - "&b&lCPU Usage:"
    - " &fProcessors: &b%cpu-cores%"
    - " &fSystem Load: &b%cpu-load%"
    - " "
    - "&b&lOperators: &f(&b%ops%&f)"
    - " &f- &b%ops-name%"
    - " "
    - "&b&lInstalled Plugins: &f(&b%plugins%&f)"
    - " &f- &b%plugins-name%"
    - " "
    - "&8&m-----------------------------------"

list-command:
  staff-format: "   &f- &f%staff%"
  player-format: "   &f- &f%player%"
  lines:
    - "&8&m-----------------------------------"
    - "&b&lOnline Staff"
    - "%staffs%"
    - " "
    - '&7[&f%online%&f/&f%max%&7] %players%'
    - "&8&m-----------------------------------"
