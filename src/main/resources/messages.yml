alert-format:
  - ""
  - "&c&lALERT &8- &f%message%"
  - ""

chat:
  format:
    regular: "&f%player%&f: &f%message%"
    staff: "&b%player%&f: &f%message%"

conversation:
  cant-msg-self: "&cYou cannot message yourself!"
  from: "&f(&bFrom %sender%&f) %message%"
  to: "&f(&bTo %receiver%&f) %message%"

on-join:
  title-sender:
    enabled: true
    main-title: "&b&lRevere SMP"
    sub-title: "&fWelcome to Revere's SMP server, &b%player%&f!"
  messages:
    bars-format: "&8&m-----------------------------------"
    welcome-message:
      enabled: true
      message:
        - " "
        - "%bars%"
        - " "
        - "  &fWelcome to the server, &b%player%&f! &7(&c%health%&4❤&7)"
        - " "
        - "   ● Website: &bhttps://www.revere.dev"
        - "   ● Discord: &bhttps://discord.revere.dev"
        - "   ● Store: &bhttps://store.revere.dev"
        - "   ● Vote: &bhttps://minecraft-mp.com/server-s333120"
        - " "
        - " &fNew to the server? &b[Type /rules]"
        - " "
        - "%bars%"
        - " "
    joined-the-game: "&f[&b+&f] &b%player% &fhas joined."
    first-join: "&f[&b+&f] &fWelcome to &b%player%'s first time on the server!"

on-leave:
  messages:
    left-the-game: "&f[&c-&f] &c%player% &fhas left."

staff:
  ore-notify:
    delay: 10
    enabled: true
    message: "&f&l[&b&lStaff&f&l] &b%player% &fmined &b%total% &f%ore% ores in the last &b%time% &fseconds."
  logger:
    enabled: true
    commands: ["gamemode", "teleport", "tp", "give"]
    message: "&f&l[&b&lStaff&f&l] &b%player% &fhas executed command: &b%command%&f."
  chat:
    format: "&f[&bStaff&f] &b%player%&f: &7%message%"
  report:
    format: "&f[&bReport&f] &b%player% &fhas reported &b%target% &ffor &b%reason%&f."
  help:
    format: "&f[&bRequest&f] &b%player% &fhas requested help from staff. &7(&b%message%&7)"


reload:
  reloading:
    - "&r"
    - "&8&m-----------------------------------------------------"
    - " &7[&cWARNING&7] &fReloading the configuration files..."
    - "&r"
    - " &8[&bMenus folder, Commands.yml, Database.yml"
    - " &bMessages.yml, Ranks.yml, &bSettings.yml&8]"
    - "&8&m-----------------------------------------------------"
    - "&r"
  finished:
    - "&b➥ &fSuccessfully reloaded the &bconfiguration &ffiles! &f(&b%timetaken% ms&f)"
    - "&r"

instance-command:
  separator-format: "&f, &b"
  lines:
    - " "
    - "&8&m-----------------------------------"
    - " "
    - "&b&lServer Details:"
    - " &fVersion: &b%version%"
    - " &fServer Region: &b%server-region%"
    - " &fServer Name: &b%server-name%"
    - " &fSoftware: &b%spigot%"
    - " &fUptime: &b%uptime%"
    - " &fTPS: &b%tps1% %tps2% %tps3%"
    - " &fPlayers: &b%online-players%&f/&b%max-players%"
    - " "
    - "&b&lMemory Usage:"
    - " &fMax Memory: &b%max-memory%"
    - " &fFree Memory: &b%free-memory%"
    - " &fUsed Memory: &b%used-memory%"
    - " &fAllocated Memory: &b%allocated-memory%"
    - " "
    - "&b&lCPU Usage:"
    - " &fProcessors: &b%cpu-cores%"
    - " &fSystem Load: &b%cpu-load%"
    - " "
    - "&b&lOperators: &f(&b%ops%&f)"
    - " &f- &b%ops-name%"
    - " "
    - "&b&lInstalled Plugins: &f(&b%plugins%&f)"
    - " &f- &b%plugins-name%"
    - " "
    - "&8&m-----------------------------------"